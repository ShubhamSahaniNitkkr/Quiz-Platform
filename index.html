<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | Quiz Platform</title>
  <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css">
  <link href="css/main.css" rel="stylesheet">
  <link href="css/quiz-fix.css" rel="stylesheet">
  <link href="css/responsive-base.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700" rel="stylesheet">
  <link rel="icon" href="images/logo.png">
  <style>
    .sidenav {
      height: 100%; width: 0; position: fixed; z-index: 1050; top: 0; left: 0;
      background: #111; overflow-x: hidden; transition: 0.3s; padding-top: 60px;
    }
    .sidenav a { padding: 10px 32px; text-decoration: none; font-size: 18px; color: #aaa; display: block; }
    .sidenav a:hover { color: #fff; }
    .sidenav .closebtn { position: absolute; top: 10px; right: 20px; font-size: 32px; }
  </style>
</head>
<body>
  <div id="mySidenav" class="sidenav">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <ul class="nav navbar-nav exam-nav"></ul>
  </div>

  <section class="hero-section">
    <img src="images/home_page.jpeg" class="hero-bg" alt="">

    <nav class="navbar navbar-fixed">
      <div class="navbar-header">
        <button type="button" class="navbar-toggle collapsed" onclick="openNav()" style="background:transparent;border:1px solid rgba(255,255,255,0.5);">
          <span class="icon-bar" style="background:#fff"></span>
          <span class="icon-bar" style="background:#fff"></span>
          <span class="icon-bar" style="background:#fff"></span>
        </button>
        <a class="navbar-brand" href="index.html">
          <img src="images/logo.png" alt="Quiz Platform">
        </a>
      </div>
      <div class="collapse navbar-collapse">
        <ul class="nav navbar-nav navbar-right exam-nav"></ul>
      </div>
    </nav>

    <div class="hero-content">
      <div class="hero-layout">
        <div class="hero-text">
          <img src="images/logo.png" alt="Quiz" class="hero-logo visible-xs visible-sm">
          <h1 class="headings" id="home-heading">Loading...</h1>
          <p class="sub_headingss" id="home-subheading"></p>
        </div>
        <div>
          <p style="font-size:0.85rem;opacity:0.8;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;">Choose an exam</p>
          <div class="exam-grid" id="home-exam-buttons"></div>
        </div>
      </div>
    </div>
  </section>

  <div class="play-store-link">
    <a href="https://play.google.com/store/apps/details?id=com.Quiz.app.aptitude">
      <img src="images/googlePlay.png" alt="Download on Play Store">
    </a>
  </div>

  <script src="bootstrap/js/jquery-2.0.2.min.js"></script>
  <script src="bootstrap/js/bootstrap.min.js"></script>
  <script src="js/home-page.js"></script>
</body>
</html>
